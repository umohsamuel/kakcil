name: CI/CD → GCE VM (Backend)

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - ".github/workflows/ci-cd.yml"

env:
  IMAGE_NAME: myapp
  IMAGE_TAG: latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      REMOTE_DIR: ${{ secrets.GCE_REMOTE_DIR }}
      SSH_USER: ${{ secrets.GCE_SSH_USER }}
      SSH_HOST: ${{ secrets.GCE_SSH_HOST }}
      SSH_PORT: ${{ secrets.GCE_SSH_PORT || '22' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test secrets
        run: |
          echo "Testing if secrets work..."
          if [ "${{ secrets.TEST_SECRET }}" = "80085" ]; then
            echo "✅ Secrets are working correctly!"
          else
            echo "❌ Secret test failed. Value: ${{ secrets.TEST_SECRET }}"
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./api
        run: bun install --frozen-lockfile

      - name: Build Docker image
        working-directory: ./api
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .
          docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -o myapp-image.tar
          ls -lh myapp-image.tar
          echo "Image size: $(du -h myapp-image.tar | cut -f1)"

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ env.SSH_PORT }} ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy Docker image to GCE VM
        run: |
          echo "📦 Copying Docker image to VM..."
          scp -i ~/.ssh/id_rsa \
            -P ${{ env.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            api/myapp-image.tar \
            ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.REMOTE_DIR }}/
          echo "✅ Copy complete"

      - name: Create env file on VM
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          port: ${{ env.SSH_PORT }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          envs: REMOTE_DIR
          script: |
            set -e                    
            mkdir -p "${REMOTE_DIR}"        
            cd "${REMOTE_DIR}"
            cat > .env << 'EOF'
            SERVER_PORT=8080
            TEST_SECRET=${{ secrets.TEST_SECRET }}
            CLIENT_ORIGIN=${{ secrets.CLIENT_ORIGIN }}
            COOKIE_EXPIRES=${{ secrets.COOKIE_EXPIRES }}
            COOKIE_SECRET=${{ secrets.COOKIE_SECRET }}
            JWT_EXPIRES=${{ secrets.JWT_EXPIRES }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            REFRESH_JWT_EXPIRES=${{ secrets.REFRESH_JWT_EXPIRES }}
            REFRESH_JWT_SECRET=${{ secrets.REFRESH_JWT_SECRET }}
            NODE_ENV=${{ secrets.NODE_ENV }}
            PGHOST=${{ secrets.PGHOST }}
            PGDATABASE=${{ secrets.PGDATABASE }}
            PGUSER=${{ secrets.PGUSER }}
            PGPASSWORD=${{ secrets.PGPASSWORD }}
            PGSSLMODE=${{ secrets.PGSSLMODE }}
            PGCHANNELBINDING=${{ secrets.PGCHANNELBINDING }}
            PGPORT=${{ secrets.PGPORT }}
            MAILER_USER=${{ secrets.MAILER_USER }}
            MAILER_PASSWORD=${{ secrets.MAILER_PASSWORD }}
            MAILER_SERVICE=${{ secrets.MAILER_SERVICE }}
            GOOGLE_GENERATIVE_AI_API_KEY=${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            PAYSTACK_SECRET_KEY=${{ secrets.PAYSTACK_SECRET_KEY }}
            PAYSTACK_PUBLIC_KEY=${{ secrets.PAYSTACK_PUBLIC_KEY }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            EOF
            chmod 600 .env
            echo "✅ .env created at: $(realpath .env)" 
            echo "✅ Environment file created"
            echo "📝 Environment file contents (secrets hidden):"
            cat .env | sed 's/=.*/=***/'

      - name: Deploy Docker container
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          port: ${{ env.SSH_PORT }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          envs: REMOTE_DIR
          script: |
            set -e

            echo "🚀 Deploying to ${REMOTE_DIR}"
            ls -la "${REMOTE_DIR}/" || echo "❌ REMOTE_DIR does not exist!"
            [ -f "${REMOTE_DIR}/.env" ] || { echo "❌ .env missing!"; exit 1; }

            echo "🚀 Starting Bun API deployment to ${REMOTE_DIR}"
            cd "${REMOTE_DIR}"

            # Verify tar file exists
            if [ ! -f myapp-image.tar ]; then
              echo "❌ Error: myapp-image.tar not found!"
              exit 1
            fi

            echo "📦 File size: $(du -h myapp-image.tar | cut -f1)"

            # Load the new Docker image
            echo "📦 Loading Docker image..."
            docker load -i myapp-image.tar

            # Tag with timestamp for backup
            TIMESTAMP=$(date +%s)
            docker tag myapp:latest myapp:backup-$TIMESTAMP || true

            # Remove old containers
            echo "🧹 Cleaning up old containers..."
            docker stop myapp 2>/dev/null || true
            docker rm myapp 2>/dev/null || true

            # Start new container with env file
            echo "🐳 Starting new Bun container..."
            docker run -d \
              --name myapp \
              --restart unless-stopped \
              -p 8080:8080 \
              --env-file "${REMOTE_DIR}/.env" \
              --log-driver json-file \
              --log-opt max-size=10m \
              --log-opt max-file=3 \
              myapp:latest

            # Wait for container to start
            echo "⏳ Waiting for container to be healthy..."
            sleep 10

            # Show container logs
            echo "📝 Container logs:"
            docker logs myapp

            # Health check
            echo "🔍 Testing health endpoint..."
            if curl -f http://localhost:8080/health; then
              echo "✅ Deployment successful! Health check passed."
              
              # Show container info
              echo "📊 Container info:"
              docker ps --filter name=myapp --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
              
              # Cleanup old images (keep last 3 backups)
              echo "🧹 Cleaning up old backup images..."
              docker images myapp --format "{{.Tag}}" | grep "backup-" | sort -r | tail -n +4 | xargs -r -I {} docker rmi myapp:{} || true
              
              # Remove dangling images
              docker image prune -f
              
              # Cleanup tar file
              rm -f myapp-image.tar
            else
              echo "❌ Health check failed! Rolling back..."
              echo "📝 Failed container logs:"
              docker logs myapp
              
              docker stop myapp
              docker rm myapp
              
              # Restore previous version if exists
              LAST_BACKUP=$(docker images myapp --format "{{.Tag}}" | grep "backup-" | sort -r | head -n 1)
              if [ ! -z "$LAST_BACKUP" ]; then
                echo "♻️ Restoring backup: $LAST_BACKUP"
                docker run -d \
                  --name myapp \
                  --restart unless-stopped \
                  -p 8080:8080 \
                  --env-file "${REMOTE_DIR}/.env" \
                  myapp:$LAST_BACKUP
              fi
              exit 1
            fi

            echo "🎉 Bun API deployment complete!"

      - name: Verify deployment
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          port: ${{ env.SSH_PORT }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          script: |
            echo "📊 Container status:"
            docker ps --filter name=myapp
            echo ""
            echo "📝 Recent logs:"
            docker logs --tail 30 myapp
            echo ""
            echo "🔍 Testing endpoints:"
            curl -s http://localhost:8080 || echo "Main endpoint failed"
            echo ""
            curl -s http://localhost:8080/health || echo "Health endpoint failed"
